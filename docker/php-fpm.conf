[www]
listen = 127.0.0.1:9000

user = www-data
group = www-data

; Pass Railway env vars (DB_HOST, APP_KEY, etc.) to PHP workers
clear_env = no

pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

request_terminate_timeout = 300

; Log to stderr for Docker/Railway log collection
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /dev/stderr
