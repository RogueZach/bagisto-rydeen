server {
    listen ${PORT};
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 100M;
    error_log /dev/stderr warn;
    access_log /dev/stdout;

    # Pure Nginx healthcheck — no PHP, guaranteed 200
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Block access to hidden files and directories (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block Vite dev path traversal attempts
    location ~ ^/@fs/ {
        return 404;
    }

    # Block common scanner targets (WordPress, debug tools)
    location ~* (wp-admin|wp-login|wp-includes|xmlrpc\.php|wlwmanifest\.xml) {
        return 404;
    }

    # Block debug/monitoring endpoints
    location ~* ^/(telescope|horizon|debugbar|actuator|server-status|debug) {
        return 404;
    }

    # Block scanner probes for backups, dumps, and archives — short-circuit before PHP
    location ~* \.(zip|tar|tar\.gz|tgz|rar|7z|sql|sql\.gz|bak|backup|old|swp|dump)$ {
        access_log off;
        return 404;
    }

    # Serve static files directly — bypass PHP entirely
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pass PHP to FPM via TCP
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # All other requests: try file, then directory, then Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
